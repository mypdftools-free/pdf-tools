<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Text to PDF | My PDF Tools</title>

<!-- PDF LIB -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
*{box-sizing:border-box}

body{
margin:0;
font-family:-apple-system,Arial;
background:#f7f8fc;
color:#222;
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:16px;
background:white;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.logo{
font-weight:bold;
font-size:18px;
color:#e53935;
}

/* CONTAINER */
.container{
padding:20px 16px;
}

/* TITLE */
h1{
font-size:24px;
margin-bottom:10px;
}

p{
color:#666;
font-size:14px;
margin-bottom:20px;
}

/* TEXTAREA */
textarea{
width:100%;
height:250px;
border-radius:16px;
border:2px solid #f28b82;
padding:14px;
font-size:15px;
outline:none;
resize:none;
}

/* BUTTON */
button{
width:100%;
margin-top:20px;
padding:16px;
border:none;
border-radius:16px;
background:#e53935;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#d32f2f;
}

/* FOOTER */
.footer{
text-align:center;
padding:20px;
font-size:13px;
color:#666;
}

.footer a{
margin:0 6px;
color:#007bff;
text-decoration:none;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">My PDF Tools</div>
</div>

<!-- CONTENT -->
<div class="container">

  <h1>Text to PDF</h1>
  <p>Create a PDF document from plain text.</p>

  <textarea id="text" placeholder="Enter your text here..."></textarea>

  <button onclick="createPDF()">Create PDF</button>

</div>

<!-- FOOTER -->
<div class="footer">
  © 2026 My PDF Tools  
  <br><br>
  <a href="privacy.html">Privacy Policy</a> |
  <a href="about.html">About Us</a> |
  <a href="contact.html">Contact</a>
</div>

<script>
function createPDF(){
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  let text = document.getElementById("text").value;

  if(!text){
    alert("Please enter some text");
    return;
  }

  let lines = doc.splitTextToSize(text, 180);

  doc.setFontSize(14);
  doc.text(lines, 10, 20);

  doc.save("text.pdf");
}
</script>

</body>
</html>
