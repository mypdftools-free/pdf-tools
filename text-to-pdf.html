<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- SEO -->
<title>Text to PDF Online Free | My PDF Tools</title>
<meta name="description" content="Convert text to PDF online for free. Type or paste text and download as PDF instantly. No upload required.">

<!-- GOOGLE ANALYTICS -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-NCYXFHG3BJ"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-NCYXFHG3BJ');
</script>

<!-- PDF LIB -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, Arial;
  background: #f2f4f7;
}

/* NAVBAR */
.navbar {
  background: #007bff;
  color: white;
  padding: 16px;
  font-size: 18px;
  font-weight: bold;
  text-align: center;
}

/* CONTAINER */
.container {
  padding: 16px;
}

/* CARD */
.card {
  background: white;
  padding: 18px;
  border-radius: 18px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.08);
}

/* INPUTS */
input, select, textarea {
  width: 100%;
  margin-top: 10px;
  padding: 12px;
  border-radius: 12px;
  border: 1px solid #ddd;
  font-size: 14px;
}

/* TEXT AREA */
textarea {
  height: 220px;
  resize: none;
}

/* BUTTON */
button {
  width: 100%;
  padding: 14px;
  margin-top: 15px;
  border: none;
  border-radius: 14px;
  background: #007bff;
  color: white;
  font-size: 16px;
  font-weight: bold;
}

/* BACK */
.back {
  display: block;
  margin: 15px;
  text-decoration: none;
  color: #007bff;
}

/* LOADER */
.loader {
  display: none;
  text-align: center;
  margin-top: 10px;
  color: green;
}
</style>

</head>

<body>

<h1 style="display:none;">Text to PDF Online Free</h1>

<div class="navbar">Text to PDF</div>

<a href="index.html" class="back">← Back</a>

<div class="container">
  <div class="card">

    <label>Document Title</label>
    <input type="text" id="title" placeholder="Enter title">

    <label>Font Size</label>
    <select id="fontSize">
      <option value="12">Small</option>
      <option value="16" selected>Medium</option>
      <option value="22">Large</option>
    </select>

    <label>Enter Text</label>
    <textarea id="content" placeholder="Type or paste your text here..."></textarea>

    <button onclick="generatePDF()">Convert to PDF</button>

    <div class="loader" id="loader">Generating PDF...</div>

  </div>
</div>

<script>
function generatePDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  let title = document.getElementById("title").value;
  let content = document.getElementById("content").value;
  let fontSize = parseInt(document.getElementById("fontSize").value);

  if (!content) {
    alert("Enter text");
    return;
  }

  loader.style.display = "block";

  let y = 20;

  // TITLE
  if (title) {
    doc.setFontSize(18);
    doc.text(title, 10, y);
    y += 10;
  }

  // CONTENT
  doc.setFontSize(fontSize);

  let lines = doc.splitTextToSize(content, 180);

  lines.forEach(line => {
    if (y > 280) {
      doc.addPage();
      y = 20;
    }
    doc.text(line, 10, y);
    y += fontSize * 0.5;
  });

  loader.style.display = "none";

  doc.save("text-to-pdf.pdf");
}
</script>

</body>
</html>
