<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rotate PDF Online Free | My PDF Tools</title>
<meta name="description" content="Rotate PDF pages easily. Free and secure tool.">

<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-4F4E51SPE0"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-4F4E51SPE0');
</script>

<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>

<style>
*{box-sizing:border-box}

body{
margin:0;
font-family:-apple-system,Arial;
background:#f7f8fc;
color:#222;
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:16px;
background:white;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.logo{
font-weight:bold;
color:#e53935;
font-size:18px;
}

/* CONTAINER */
.container{
padding:20px 16px;
}

h1{font-size:24px;}
.subtitle{
color:#666;
margin-bottom:20px;
}

/* DROP */
.drop{
border:2px dashed #ddd;
border-radius:20px;
padding:45px 20px;
text-align:center;
background:white;
cursor:pointer;
transition:0.2s;
}

.drop.active{
border-color:#e53935;
background:#fff5f5;
}

/* ICON */
.icon-box{
width:70px;
height:70px;
background:#f1f3f6;
border-radius:16px;
display:flex;
align-items:center;
justify-content:center;
margin:auto;
margin-bottom:12px;
}

/* FILE */
.file{
margin-top:15px;
background:#f1f3f6;
padding:12px;
border-radius:14px;
display:flex;
justify-content:space-between;
align-items:center;
}

/* ANGLES */
.angles{
display:flex;
gap:10px;
margin-top:20px;
}

.angle{
flex:1;
padding:14px;
border-radius:14px;
background:#eee;
text-align:center;
font-weight:600;
cursor:pointer;
}

.angle.active{
background:#e53935;
color:white;
}

/* BUTTON */
button{
width:100%;
padding:16px;
margin-top:20px;
border:none;
border-radius:16px;
background:#e53935;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

/* FOOTER */
.footer{
text-align:center;
padding:20px;
font-size:13px;
color:#666;
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">My PDF Tools</div>
</div>

<div class="container">

<h1>Rotate PDF</h1>
<div class="subtitle">Rotate all pages of a PDF by a selected angle.</div>

<!-- DROP -->
<div class="drop" id="dropArea" onclick="fileInput.click()">

  <div class="icon-box">
    <svg width="32" height="32" stroke="#6b7280" fill="none" stroke-width="2">
      <path d="M12 16V4"></path>
      <path d="M8 8l4-4 4 4"></path>
      <rect x="4" y="16" width="16" height="4" rx="2"></rect>
    </svg>
  </div>

  <div>Drop a PDF here</div>
  <div style="font-size:13px;color:#888">Max 50MB per file</div>

</div>

<input type="file" id="fileInput" accept="application/pdf" hidden>

<div id="fileBox"></div>

<!-- ANGLES -->
<div class="angles">
  <div class="angle active" onclick="setAngle(90,this)">90°</div>
  <div class="angle" onclick="setAngle(180,this)">180°</div>
  <div class="angle" onclick="setAngle(270,this)">270°</div>
</div>

<button onclick="rotatePDF()">Rotate PDF</button>

</div>

<div class="footer">
© 2026 My PDF Tools
</div>

<script>
let file=null;
let angle=90;

// SELECT
fileInput.onchange=e=>{
file=e.target.files[0];
showFile();
activateDrop();
};

// DROP
let drop=document.getElementById("dropArea");

drop.addEventListener("dragover",e=>{
e.preventDefault();
drop.classList.add("active");
});

drop.addEventListener("dragleave",()=>{
drop.classList.remove("active");
});

drop.addEventListener("drop",e=>{
e.preventDefault();
drop.classList.add("active");
file=e.dataTransfer.files[0];
showFile();
});

// FILE UI
function showFile(){
fileBox.innerHTML=`
<div class="file">
  <span>${file.name}</span>
  <span>${(file.size/1024).toFixed(0)} KB ❌</span>
</div>
`;
}

// ACTIVATE DROP STYLE
function activateDrop(){
drop.classList.add("active");
}

// ANGLE SELECT
function setAngle(a,el){
angle=a;
document.querySelectorAll(".angle").forEach(b=>b.classList.remove("active"));
el.classList.add("active");
}

// ROTATE
async function rotatePDF(){
if(!file){
alert("Upload PDF");
return;
}

const { PDFDocument, degrees } = PDFLib;

let bytes=await file.arrayBuffer();
let pdf=await PDFDocument.load(bytes);

pdf.getPages().forEach(p=>{
p.setRotation(degrees(angle));
});

let final=await pdf.save();

let blob=new Blob([final],{type:"application/pdf"});
let link=document.createElement("a");
link.href=URL.createObjectURL(blob);
link.download="rotated.pdf";
link.click();
}
</script>

</body>
</html>
