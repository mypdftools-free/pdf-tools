<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rotate PDF</title>

  <style>
    body {
      font-family: Arial;
      background: #f4f6f9;
      text-align: center;
      padding: 20px;
    }

    .container {
      background: white;
      padding: 20px;
      border-radius: 12px;
      max-width: 450px;
      margin: auto;
      box-shadow: 0 3px 10px rgba(0,0,0,0.1);
    }

    h2 {
      margin-bottom: 10px;
    }

    .drop-area {
      border: 2px dashed #007bff;
      padding: 20px;
      border-radius: 10px;
      cursor: pointer;
      margin-bottom: 10px;
      color: #555;
    }

    .drop-area:hover {
      background: #f0f8ff;
    }

    .file-name {
      margin-top: 8px;
      font-size: 14px;
      color: #333;
    }

    .options {
      margin-top: 10px;
    }

    select {
      padding: 8px;
      margin-top: 5px;
      width: 80%;
    }

    button {
      margin-top: 10px;
      padding: 10px;
      border: none;
      border-radius: 5px;
      background: #007bff;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }

    .loader {
      display: none;
      color: green;
      font-weight: bold;
      margin-top: 10px;
    }

    .hint {
      font-size: 12px;
      color: gray;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>🔄 Rotate PDF</h2>

  <div class="drop-area" id="dropArea">
    Drag & Drop PDF or Click to Upload
  </div>

  <input type="file" id="fileInput" accept="application/pdf" hidden>

  <div class="file-name" id="fileName"></div>

  <div class="options">
    <label>Select Rotation</label><br>
    <select id="angle">
      <option value="90">Rotate 90°</option>
      <option value="180">Rotate 180°</option>
      <option value="270">Rotate 270°</option>
    </select>
  </div>

  <button onclick="rotatePDF()">Rotate PDF</button>

  <div class="loader" id="loader">Processing...</div>
</div>

<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>

<script>
let file = null;

// Upload click
document.getElementById("dropArea").onclick = () => {
  document.getElementById("fileInput").click();
};

// File select
document.getElementById("fileInput").addEventListener("change", e => {
  file = e.target.files[0];
  document.getElementById("fileName").innerText = file.name;
});

// Drag & drop
let dropArea = document.getElementById("dropArea");

dropArea.addEventListener("dragover", e => {
  e.preventDefault();
  dropArea.style.background = "#e0f0ff";
});

dropArea.addEventListener("dragleave", () => {
  dropArea.style.background = "";
});

dropArea.addEventListener("drop", e => {
  e.preventDefault();
  dropArea.style.background = "";
  file = e.dataTransfer.files[0];
  document.getElementById("fileName").innerText = file.name;
});

// Rotate logic
async function rotatePDF() {
  const { PDFDocument, degrees } = PDFLib;

  if (!file) {
    alert("Please upload a PDF");
    return;
  }

  let angle = parseInt(document.getElementById("angle").value);

  document.getElementById("loader").style.display = "block";

  try {
    const bytes = await file.arrayBuffer();
    const pdf = await PDFDocument.load(bytes);

    pdf.getPages().forEach(page => {
      page.setRotation(degrees(angle));
    });

    const finalPdf = await pdf.save();

    download(finalPdf, "rotated.pdf");
  } catch (e) {
    alert("Error processing PDF");
  }

  document.getElementById("loader").style.display = "none";
}

// Download
function download(data, name) {
  const blob = new Blob([data], { type: "application/pdf" });
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = name;
  link.click();
}
</script>

</body>
</html>
