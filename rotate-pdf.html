 <!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- SEO -->
<title>Rotate PDF Online Free | My PDF Tools</title>
<meta name="description" content="Rotate PDF pages online for free. Rotate 90, 180, 270 degrees easily. No upload required. Fast and secure.">

<!-- GOOGLE ANALYTICS -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-NCYXFHG3BJ"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-NCYXFHG3BJ');
</script>

<!-- PDF LIB -->
<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: -apple-system, Arial;
  background: #f2f4f7;
}

/* NAVBAR */
.navbar {
  background: #007bff;
  color: white;
  padding: 16px;
  text-align: center;
  font-size: 18px;
  font-weight: bold;
}

/* CONTAINER */
.container {
  padding: 16px;
}

/* CARD */
.card {
  background: white;
  padding: 18px;
  border-radius: 18px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.08);
  max-width: 500px;
  margin: auto;
}

/* DROP AREA */
.drop-area {
  border: 2px dashed #007bff;
  padding: 25px;
  border-radius: 14px;
  text-align: center;
  cursor: pointer;
  margin-bottom: 10px;
  background: #fafafa;
}

.drop-area:hover {
  background: #eef5ff;
}

/* FILE NAME */
.file-name {
  margin-top: 8px;
  font-size: 14px;
}

/* SELECT */
select {
  padding: 10px;
  margin-top: 10px;
  width: 100%;
  border-radius: 10px;
  border: 1px solid #ddd;
}

/* BUTTON */
button {
  width: 100%;
  padding: 14px;
  margin-top: 12px;
  border: none;
  border-radius: 12px;
  background: #007bff;
  color: white;
  font-size: 15px;
}

/* LOADER */
.loader {
  display: none;
  text-align: center;
  margin-top: 10px;
  color: green;
}

/* HINT */
.hint {
  font-size: 12px;
  color: gray;
  margin-top: 5px;
}
</style>

</head>

<body>

<h1 style="display:none;">Rotate PDF Online Free</h1>

<div class="navbar">Rotate PDF</div>

<div class="container">
<div class="card">

<div class="drop-area" id="dropArea">
  Click or Drag PDF File
</div>

<input type="file" id="fileInput" accept="application/pdf" hidden>

<div class="file-name" id="fileName"></div>

<div class="hint">Choose rotation angle</div>

<select id="angle">
  <option value="90">Rotate 90°</option>
  <option value="180">Rotate 180°</option>
  <option value="270">Rotate 270°</option>
</select>

<button onclick="rotatePDF()">Rotate PDF</button>

<div class="loader" id="loader">Processing...</div>

</div>
</div>

<script>
let file = null;

const dropArea = document.getElementById("dropArea");
const fileInput = document.getElementById("fileInput");

// CLICK
dropArea.onclick = () => fileInput.click();

// DRAG DROP
dropArea.addEventListener("dragover", e => {
  e.preventDefault();
  dropArea.style.background = "#eef5ff";
});

dropArea.addEventListener("dragleave", () => {
  dropArea.style.background = "#fafafa";
});

dropArea.addEventListener("drop", e => {
  e.preventDefault();
  file = e.dataTransfer.files[0];
  document.getElementById("fileName").innerText = file.name;
});

// FILE SELECT
fileInput.addEventListener("change", e => {
  file = e.target.files[0];
  document.getElementById("fileName").innerText = file.name;
});

// ROTATE
async function rotatePDF() {
  const { PDFDocument, degrees } = PDFLib;

  if (!file) {
    alert("Upload PDF");
    return;
  }

  let angle = parseInt(document.getElementById("angle").value);

  loader.style.display = "block";

  try {
    const bytes = await file.arrayBuffer();
    const pdf = await PDFDocument.load(bytes);

    pdf.getPages().forEach(page => {
      page.setRotation(degrees(angle));
    });

    const finalPdf = await pdf.save();

    download(finalPdf, "rotated.pdf");
  } catch (e) {
    alert("Error processing PDF");
  }

  loader.style.display = "none";
}

// DOWNLOAD
function download(data, name) {
  const blob = new Blob([data], { type: "application/pdf" });
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = name;
  link.click();
}
</script>

</body>
</html>
