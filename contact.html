<style>
body {
  font-family: -apple-system, Arial;
  margin: 0;
  background: #f4f6f9;
  color: #333;
}

/* NAVBAR */
.navbar {
  background: #007bff;
  color: white;
  padding: 16px;
  text-align: center;
  font-size: 18px;
  font-weight: bold;
}

/* BACK */
.back {
  display: block;
  margin: 15px;
  text-decoration: none;
  color: #007bff;
}

/* CONTAINER */
.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

/* CARD */
.card {
  background: white;
  padding: 20px;
  border-radius: 16px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.08);
}

/* INPUTS */
input, textarea {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 12px;
  border: 1px solid #ddd;
  font-size: 14px;
}

textarea {
  height: 120px;
  resize: none;
}

/* BUTTON */
button {
  width: 100%;
  padding: 14px;
  margin-top: 15px;
  border: none;
  border-radius: 12px;
  background: #007bff;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 20px;
  font-size: 14px;

<body>

<h1 style="display:none;">Contact My PDF Tools</h1>

<div class="navbar">Contact Us</div>

<a href="index.html" class="back">← Back to Home</a>

<div class="container">
<div class="card">

<h1>Contact Us</h1>

<p>If you have any questions, feedback, or suggestions, feel free to contact us.</p>

<h2>Email</h2>
<p><strong>sksaidulu1008@gmail.com</strong></p>

<h2>Send Message</h2>

<form onsubmit="sendMail(event)">
  <input type="text" id="name" placeholder="Your Name" required>
  <input type="email" id="email" placeholder="Your Email" required>
  <textarea id="message" placeholder="Your Message" required></textarea>

  <button type="submit">Send Message</button>
</form>

</div>
</div>

<footer>
© 2026 My PDF Tools • All Rights Reserved
</footer>

<script>
function sendMail(e) {
  e.preventDefault();

  let name = document.getElementById("name").value;
  let email = document.getElementById("email").value;
  let message = document.getElementById("message").value;

  let mailto = `mailto:sksaidulu1008@gmail.com?subject=Message from ${name}&body=${message} (Email: ${email})`;

  window.location.href = mailto;
}
</script>

</body>
