<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact | My PDF Tools</title>

<style>
*{box-sizing:border-box}

body{
margin:0;
font-family:-apple-system,Arial;
background:#f7f8fc;
color:#222;
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:16px;
background:white;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.logo{
font-weight:bold;
font-size:18px;
color:#e53935;
}

/* CONTAINER */
.container{
padding:20px 16px;
max-width:900px;
margin:auto;
}

/* TEXT */
h1{
font-size:26px;
margin-bottom:10px;
}

p{
color:#666;
margin-bottom:20px;
line-height:1.6;
}

/* FORM */
input, textarea{
width:100%;
padding:16px;
margin-bottom:14px;
border-radius:14px;
border:1px solid #ddd;
font-size:15px;
outline:none;
}

textarea{
min-height:120px;
resize:none;
}

/* BUTTON */
button{
width:100%;
padding:16px;
border:none;
border-radius:14px;
background:#e53935;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

/* SUCCESS MESSAGE */
.success{
display:none;
background:#fbe9e7;
color:#d84315;
padding:18px;
border-radius:14px;
text-align:center;
margin-top:20px;
font-size:15px;
}

/* FOOTER */
.footer{
text-align:center;
padding:20px;
font-size:13px;
color:#666;
}

.footer a{
margin:0 6px;
color:#007bff;
text-decoration:none;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">My PDF Tools</div>
</div>

<!-- CONTENT -->
<div class="container">

<h1>Contact Us</h1>

<p>Have questions or feedback? We'd love to hear from you.</p>

<form id="contactForm">

<input type="text" placeholder="Your Name" required>
<input type="email" placeholder="Your Email" required>
<textarea placeholder="Your Message" required></textarea>

<button type="submit">Send Message</button>

</form>

<!-- SUCCESS MESSAGE -->
<div class="success" id="successMsg">
Thank you for your message! We'll get back to you soon.
</div>

</div>

<!-- FOOTER -->
<div class="footer">
© 2026 My PDF Tools. All processing is done in your browser.
<br><br>
<a href="privacy.html">Privacy Policy</a> |
<a href="about.html">About Us</a> |
<a href="contact.html">Contact</a>
</div>

<!-- SCRIPT -->
<script>
document.getElementById("contactForm").addEventListener("submit", function(e){
e.preventDefault();

// hide form
this.style.display = "none";

// show success message
document.getElementById("successMsg").style.display = "block";
});
</script>

</body>
</html>
