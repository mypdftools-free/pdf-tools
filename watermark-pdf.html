<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Add Watermark | My PDF Tools</title>
<meta name="description" content="Add watermark to PDF online free. Secure and fast.">

<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-4F4E51SPE0"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-4F4E51SPE0');
</script>

<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>

<style>
*{box-sizing:border-box}
body{
margin:0;
font-family:-apple-system,Arial;
background:#f7f8fc;
color:#222;
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:16px;
background:white;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}
.logo{
font-weight:bold;
color:#e53935;
font-size:18px;
}

/* CONTAINER */
.container{padding:20px 16px;}

h1{font-size:24px;}
.subtitle{color:#666;margin-bottom:20px;}

/* DROP */
.drop{
border:2px dashed #ddd;
border-radius:20px;
padding:45px 20px;
text-align:center;
background:white;
cursor:pointer;
transition:0.2s;
}
.drop.active{
border-color:#e53935;
background:#fff5f5;
}

/* ICON */
.icon-box{
width:70px;
height:70px;
background:#f1f3f6;
border-radius:16px;
display:flex;
align-items:center;
justify-content:center;
margin:auto;
margin-bottom:12px;
}

/* FILE */
.file{
margin-top:15px;
background:#f1f3f6;
padding:12px;
border-radius:14px;
display:flex;
justify-content:space-between;
align-items:center;
}

/* CARD */
.card{
background:white;
padding:18px;
border-radius:18px;
margin-top:15px;
box-shadow:0 6px 18px rgba(0,0,0,0.06);
}

/* INPUT */
.input{
width:100%;
padding:14px;
border-radius:16px;
border:2px solid #f1b5b5;
font-size:16px;
outline:none;
}

/* ROW */
.row{
display:flex;
justify-content:space-between;
margin-top:15px;
}

/* SLIDER */
.slider{
width:48%;
}

input[type=range]{
width:100%;
}

/* POSITION */
.positions{
display:flex;
gap:10px;
margin-top:15px;
}

.pos{
flex:1;
padding:12px;
border-radius:14px;
background:#eee;
text-align:center;
cursor:pointer;
}

.pos.active{
background:#e53935;
color:white;
}

/* BUTTON */
button{
width:100%;
padding:16px;
margin-top:20px;
border:none;
border-radius:16px;
background:#e53935;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

/* FOOTER */
.footer{
text-align:center;
padding:20px;
font-size:13px;
color:#666;
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">My PDF Tools</div>
</div>

<div class="container">

<h1>Add Watermark</h1>
<div class="subtitle">Add a custom text watermark to every page of your PDF.</div>

<!-- DROP -->
<div class="drop" id="dropArea" onclick="fileInput.click()">
  <div class="icon-box">
    <svg width="32" height="32" stroke="#6b7280" fill="none" stroke-width="2">
      <path d="M12 16V4"></path>
      <path d="M8 8l4-4 4 4"></path>
      <rect x="4" y="16" width="16" height="4" rx="2"></rect>
    </svg>
  </div>
  <div>Drop a PDF here</div>
  <div style="font-size:13px;color:#888">Max 50MB per file</div>
</div>

<input type="file" id="fileInput" accept="application/pdf" hidden>

<div id="fileBox"></div>

<!-- SETTINGS -->
<div class="card">

<label>Watermark Text</label>
<input type="text" id="text" class="input" placeholder="Enter text">

<div class="row">
  <div class="slider">
    <div>Font Size: <span id="sizeVal">48</span></div>
    <input type="range" min="10" max="100" value="48" id="size">
  </div>

  <div class="slider">
    <div>Opacity: <span id="opVal">30</span>%</div>
    <input type="range" min="10" max="100" value="30" id="opacity">
  </div>
</div>

<div style="margin-top:15px">Position</div>

<div class="positions">
  <div class="pos" onclick="setPos('top',this)">Top</div>
  <div class="pos active" onclick="setPos('center',this)">Center</div>
  <div class="pos" onclick="setPos('bottom',this)">Bottom</div>
</div>

</div>

<button onclick="applyWatermark()">Add Watermark</button>

</div>

<div class="footer">
© 2026 My PDF Tools
</div>

<script>
let file=null;
let position="center";

// FILE
fileInput.onchange=e=>{
file=e.target.files[0];
showFile();
activateDrop();
};

let drop=document.getElementById("dropArea");

drop.addEventListener("dragover",e=>{
e.preventDefault();
drop.classList.add("active");
});

drop.addEventListener("drop",e=>{
e.preventDefault();
drop.classList.add("active");
file=e.dataTransfer.files[0];
showFile();
});

// SHOW FILE
function showFile(){
fileBox.innerHTML=`
<div class="file">
  <span>${file.name}</span>
  <span>${(file.size/1024).toFixed(0)} KB ❌</span>
</div>`;
}

function activateDrop(){
drop.classList.add("active");
}

// SLIDERS
size.oninput=()=>sizeVal.innerText=size.value;
opacity.oninput=()=>opVal.innerText=opacity.value;

// POSITION
function setPos(p,el){
position=p;
document.querySelectorAll(".pos").forEach(b=>b.classList.remove("active"));
el.classList.add("active");
}

// APPLY
async function applyWatermark(){
if(!file){alert("Upload PDF");return;}

let text=document.getElementById("text").value;
if(!text){alert("Enter watermark text");return;}

const { PDFDocument, rgb } = PDFLib;

let pdf=await PDFDocument.load(await file.arrayBuffer());

pdf.getPages().forEach(page=>{
let { width, height } = page.getSize();

let x=width/2-50;
let y=height/2;

if(position==="top") y=height-50;
if(position==="bottom") y=50;

page.drawText(text,{
x,y,
size:parseInt(size.value),
color:rgb(0.6,0.6,0.6),
opacity:opacity.value/100
});
});

let final=await pdf.save();

let blob=new Blob([final],{type:"application/pdf"});
let link=document.createElement("a");
link.href=URL.createObjectURL(blob);
link.download="watermarked.pdf";
link.click();
}
</script>

</body>
</html>
