<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Image to PDF Online Free | My PDF Tools</title>
<meta name="description" content="Convert images to PDF online for free. No upload required. Fast and secure tool.">

<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-4F4E51SPE0"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-4F4E51SPE0');
</script>

<!-- jsPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
*{box-sizing:border-box}

body{
margin:0;
font-family:-apple-system,Arial;
background:#f7f8fc;
color:#222;
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:16px;
background:white;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.logo{
font-weight:bold;
font-size:18px;
color:#e53935;
}

/* CONTAINER */
.container{
padding:20px 16px;
}

h1{
font-size:24px;
margin-bottom:8px;
}

.subtitle{
color:#666;
font-size:14px;
margin-bottom:20px;
}

/* DROP AREA */
.drop-area{
border:2px dashed #dcdcdc;
border-radius:20px;
padding:40px 20px;
text-align:center;
background:white;
cursor:pointer;
transition:0.2s;
}

.drop-area:hover{
border-color:#e53935;
}

/* ICON BOX */
.icon-box{
width:70px;
height:70px;
background:#f1f3f6;
border-radius:16px;
display:flex;
align-items:center;
justify-content:center;
margin:auto;
margin-bottom:12px;
}

/* TEXT */
.drop-text{
font-size:16px;
font-weight:500;
}

.small{
font-size:13px;
color:#888;
margin-top:4px;
}

/* PREVIEW */
.preview{
margin-top:15px;
display:flex;
flex-wrap:wrap;
gap:10px;
}

.preview img{
width:80px;
height:80px;
border-radius:10px;
object-fit:cover;
}

/* BUTTON */
button{
width:100%;
padding:14px;
margin-top:20px;
border:none;
border-radius:14px;
background:#e53935;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

button:active{
transform:scale(0.98);
}

/* FOOTER */
.footer{
text-align:center;
padding:20px;
font-size:13px;
color:#666;
}

.footer a{
margin:0 6px;
color:#007bff;
text-decoration:none;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">📄 My PDF Tools</div>
</div>

<div class="container">

<h1>Image to PDF</h1>
<div class="subtitle">Convert your images (JPG, PNG) to a single PDF file.</div>

<!-- DROP AREA -->
<div class="drop-area" onclick="fileInput.click()" id="dropArea">

  <div class="icon-box">
    <!-- SVG ICON -->
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#6b7280" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 16V4"></path>
      <path d="M8 8l4-4 4 4"></path>
      <rect x="4" y="16" width="16" height="4" rx="2"></rect>
    </svg>
  </div>

  <div class="drop-text">Drop images here</div>
  <div class="small">Max 50MB per file</div>

</div>

<input type="file" id="fileInput" multiple accept="image/*" hidden>

<!-- PREVIEW -->
<div class="preview" id="preview"></div>

<button onclick="convert()">Convert to PDF</button>

</div>

<!-- FOOTER -->
<div class="footer">
© 2026 My PDF Tools  
<br><br>
<a href="privacy.html">Privacy Policy</a> |
<a href="about.html">About Us</a> |
<a href="contact.html">Contact</a>
</div>

<script>
let files=[];

// SELECT FILE
fileInput.onchange=e=>{
files=Array.from(e.target.files);
showPreview();
};

// DRAG DROP
let drop=document.getElementById("dropArea");

drop.addEventListener("dragover",e=>{
e.preventDefault();
drop.style.borderColor="#e53935";
});

drop.addEventListener("dragleave",()=>{
drop.style.borderColor="#dcdcdc";
});

drop.addEventListener("drop",e=>{
e.preventDefault();
drop.style.borderColor="#dcdcdc";
files=Array.from(e.dataTransfer.files);
showPreview();
});

// PREVIEW
function showPreview(){
preview.innerHTML="";
files.forEach(f=>{
let img=document.createElement("img");
img.src=URL.createObjectURL(f);
preview.appendChild(img);
});
}

// CONVERT
async function convert(){
if(files.length===0){
alert("Select images");
return;
}

const { jsPDF } = window.jspdf;
let pdf=new jsPDF();

for(let i=0;i<files.length;i++){
let imgData=await toBase64(files[i]);
let img=new Image();
img.src=imgData;

await new Promise(res=>{
img.onload=()=>{
let w=pdf.internal.pageSize.getWidth();
let h=pdf.internal.pageSize.getHeight();

pdf.addImage(img,"JPEG",0,0,w,h);

if(i<files.length-1) pdf.addPage();
res();
};
});
}

pdf.save("images.pdf");
}

// BASE64
function toBase64(file){
return new Promise(res=>{
let r=new FileReader();
r.readAsDataURL(file);
r.onload=()=>res(r.result);
});
}
</script>

</body>
</html>
