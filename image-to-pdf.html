<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- SEO -->
<title>Image to PDF Online Free | My PDF Tools</title>
<meta name="description" content="Convert images to PDF online for free. No upload required. Fast and secure tool.">

<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-4F4E51SPE0"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-4F4E51SPE0');
</script>

<!-- PDF LIB -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: -apple-system, Arial;
  background: #f2f4f7;
}

/* NAVBAR */
.navbar {
  background: #007bff;
  color: white;
  padding: 16px;
  text-align: center;
  font-size: 18px;
  font-weight: bold;
}

/* CONTAINER */
.container {
  padding: 16px;
}

/* CARD */
.card {
  background: white;
  padding: 18px;
  border-radius: 18px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.08);
}

/* DROP AREA */
.drop-area {
  border: 2px dashed #007bff;
  padding: 30px;
  border-radius: 14px;
  text-align: center;
  cursor: pointer;
  margin-bottom: 12px;
  background: #fafafa;
}

.drop-area:hover {
  background: #eef5ff;
}

/* PREVIEW */
.preview {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-top: 10px;
}

.item {
  width: 80px;
  text-align: center;
}

.item img {
  width: 80px;
  height: 80px;
  object-fit: cover;
  border-radius: 10px;
}

/* BUTTON */
button {
  width: 100%;
  padding: 14px;
  margin-top: 12px;
  border: none;
  border-radius: 12px;
  background: #007bff;
  color: white;
  font-size: 16px;
}

/* SMALL BUTTONS */
.small-btn {
  padding: 4px;
  font-size: 11px;
  margin-top: 4px;
}

/* SELECT */
select {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
}

/* LOADER */
.loader {
  display: none;
  text-align: center;
  margin-top: 10px;
  color: green;
}
</style>

</head>

<body>

<h1 style="display:none;">Image to PDF Online Free</h1>

<div class="navbar">Image to PDF</div>

<div class="container">
<div class="card">

<div class="drop-area" id="drop">
  Click or Drag Images Here
</div>

<input type="file" id="fileInput" multiple accept="image/*" hidden>

<select id="pageSize">
  <option value="a4">A4 Size (Fit)</option>
  <option value="auto">Original Size</option>
</select>

<div class="preview" id="preview"></div>

<button onclick="convert()">Convert to PDF</button>

<div class="loader" id="loader">Processing...</div>

</div>
</div>

<script>
let files = [];

const drop = document.getElementById("drop");
const fileInput = document.getElementById("fileInput");

// CLICK
drop.onclick = () => fileInput.click();

// DRAG DROP
drop.ondragover = e => {
  e.preventDefault();
  drop.style.background = "#eef5ff";
};

drop.ondragleave = () => {
  drop.style.background = "#fafafa";
};

drop.ondrop = e => {
  e.preventDefault();
  files = Array.from(e.dataTransfer.files);
  showPreview();
};

// FILE SELECT
fileInput.onchange = e => {
  files = Array.from(e.target.files);
  showPreview();
};

// PREVIEW
function showPreview() {
  preview.innerHTML = "";

  files.forEach((file, i) => {
    let div = document.createElement("div");
    div.className = "item";

    let img = document.createElement("img");
    img.src = URL.createObjectURL(file);

    let del = document.createElement("button");
    del.innerText = "❌";
    del.className = "small-btn";
    del.onclick = () => {
      files.splice(i,1);
      showPreview();
    };

    div.appendChild(img);
    div.appendChild(del);

    preview.appendChild(div);
  });
}

// CONVERT
async function convert() {
  const { jsPDF } = window.jspdf;

  if(files.length === 0){
    alert("Select images");
    return;
  }

  loader.style.display = "block";

  let pdf = new jsPDF();
  let mode = document.getElementById("pageSize").value;

  for(let i = 0; i < files.length; i++){

    let imgData = await toBase64(files[i]);

    let img = new Image();
    img.src = imgData;

    await new Promise(resolve=>{
      img.onload = function(){

        if(mode === "auto"){
          pdf = new jsPDF({
            unit:"px",
            format:[img.width,img.height]
          });
        }

        let pageW = pdf.internal.pageSize.getWidth();
        let pageH = pdf.internal.pageSize.getHeight();

        let ratio = Math.min(pageW/img.width, pageH/img.height);

        let w = img.width * ratio;
        let h = img.height * ratio;

        let x = (pageW - w)/2;
        let y = (pageH - h)/2;

        if(i > 0) pdf.addPage();

        pdf.addImage(img, "JPEG", x, y, w, h);

        resolve();
      }
    });
  }

  loader.style.display = "none";

  pdf.save("images.pdf");
}

// BASE64
function toBase64(file){
  return new Promise(res=>{
    let r = new FileReader();
    r.readAsDataURL(file);
    r.onload = () => res(r.result);
  });
}
</script>

</body>
</html>
