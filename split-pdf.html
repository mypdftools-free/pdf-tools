<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Split PDF Online Free | My PDF Tools</title>
<meta name="description" content="Extract pages from PDF easily. Free, secure and works in browser.">

<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-4F4E51SPE0"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-4F4E51SPE0');
</script>

<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>

<style>
*{box-sizing:border-box}

body{
margin:0;
font-family:-apple-system,Arial;
background:#f7f8fc;
color:#222;
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:16px;
background:white;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.logo{
font-weight:bold;
color:#e53935;
font-size:18px;
}

/* CONTAINER */
.container{
padding:20px 16px;
}

h1{font-size:24px;}
.subtitle{
color:#666;
margin-bottom:20px;
}

/* DROP */
.drop{
border:2px dashed #ddd;
border-radius:20px;
padding:45px 20px;
text-align:center;
background:white;
cursor:pointer;
transition:0.2s;
}

.drop.active{
border-color:#e53935;
background:#fff5f5;
}

/* ICON */
.icon-box{
width:70px;
height:70px;
background:#f1f3f6;
border-radius:16px;
display:flex;
align-items:center;
justify-content:center;
margin:auto;
margin-bottom:12px;
}

/* TEXT */
.drop-text{font-size:16px;}
.small{font-size:13px;color:#888;}

/* FILE */
.file{
margin-top:15px;
background:#f1f3f6;
padding:12px;
border-radius:14px;
display:flex;
justify-content:space-between;
align-items:center;
}

.file span{
font-size:14px;
}

/* INPUT */
.input{
margin-top:20px;
}

.input label{
display:block;
margin-bottom:6px;
font-size:14px;
}

.input input{
width:100%;
padding:14px;
border-radius:14px;
border:1px solid #ddd;
font-size:14px;
}

/* BUTTON */
button{
width:100%;
padding:14px;
margin-top:20px;
border:none;
border-radius:14px;
background:#e53935;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

/* FOOTER */
.footer{
text-align:center;
padding:20px;
font-size:13px;
color:#666;
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">My PDF Tools</div>
</div>

<div class="container">

<h1>Split PDF</h1>
<div class="subtitle">Extract specific pages from a PDF file.</div>

<!-- DROP -->
<div class="drop" id="dropArea" onclick="fileInput.click()">

  <div class="icon-box">
    <svg width="32" height="32" stroke="#6b7280" fill="none" stroke-width="2">
      <path d="M12 16V4"></path>
      <path d="M8 8l4-4 4 4"></path>
      <rect x="4" y="16" width="16" height="4" rx="2"></rect>
    </svg>
  </div>

  <div class="drop-text">Drop a PDF here</div>
  <div class="small">Max 50MB per file</div>

</div>

<input type="file" id="fileInput" accept="application/pdf" hidden>

<!-- FILE -->
<div id="fileBox"></div>

<!-- INPUT -->
<div class="input">
  <label>Page range (e.g. 1–3, 5, 8–10)</label>
  <input type="text" id="range" placeholder="1–3, 5, 8–10">
</div>

<button onclick="splitPDF()">Split PDF</button>

</div>

<div class="footer">
© 2026 My PDF Tools
</div>

<script>
let file=null;

// SELECT
fileInput.onchange=e=>{
file=e.target.files[0];
showFile();
};

// DROP
let drop=document.getElementById("dropArea");

drop.addEventListener("dragover",e=>{
e.preventDefault();
drop.classList.add("active");
});

drop.addEventListener("dragleave",()=>{
drop.classList.remove("active");
});

drop.addEventListener("drop",e=>{
e.preventDefault();
drop.classList.add("active");
file=e.dataTransfer.files[0];
showFile();
});

// SHOW FILE
function showFile(){
fileBox.innerHTML=`
<div class="file">
  <span>${file.name}</span>
  <span>${(file.size/1024).toFixed(0)} KB ❌</span>
</div>
`;
}

// SPLIT
async function splitPDF(){
if(!file){
alert("Upload PDF");
return;
}

let input=document.getElementById("range").value;
if(!input){
alert("Enter page range");
return;
}

const { PDFDocument } = PDFLib;

let bytes=await file.arrayBuffer();
let pdf=await PDFDocument.load(bytes);
let newPdf=await PDFDocument.create();

let pages=parseRange(input);

let copied=await newPdf.copyPages(pdf,pages);
copied.forEach(p=>newPdf.addPage(p));

let final=await newPdf.save();

download(final,"split.pdf");
}

// PARSE RANGE
function parseRange(str){
let pages=[];
str.split(",").forEach(part=>{
if(part.includes("-")){
let [a,b]=part.split("-").map(n=>parseInt(n)-1);
for(let i=a;i<=b;i++) pages.push(i);
}else{
pages.push(parseInt(part)-1);
}
});
return pages;
}

// DOWNLOAD
function download(data,name){
let blob=new Blob([data],{type:"application/pdf"});
let link=document.createElement("a");
link.href=URL.createObjectURL(blob);
link.download=name;
link.click();
}
</script>

</body>
</html>
