<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- SEO -->
<title>Split PDF Online Free | My PDF Tools</title>
<meta name="description" content="Split PDF pages online for free. Extract single page or page range. No upload required. Fast and secure.">

<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-4F4E51SPE0"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-4F4E51SPE0');
</script>

<!-- PDF LIB -->
<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: -apple-system, Arial;
  background: #f2f4f7;
}

/* NAVBAR */
.navbar {
  background: #007bff;
  color: white;
  padding: 16px;
  text-align: center;
  font-size: 18px;
  font-weight: bold;
}

/* CONTAINER */
.container {
  padding: 16px;
}

/* CARD */
.card {
  background: white;
  padding: 18px;
  border-radius: 18px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.08);
  max-width: 500px;
  margin: auto;
}

/* DROP AREA */
.drop-area {
  border: 2px dashed #007bff;
  padding: 25px;
  border-radius: 14px;
  text-align: center;
  cursor: pointer;
  margin-bottom: 10px;
  background: #fafafa;
}

.drop-area:hover {
  background: #eef5ff;
}

/* INPUTS */
input[type="number"] {
  padding: 10px;
  margin: 6px;
  width: 45%;
  border-radius: 8px;
  border: 1px solid #ddd;
}

/* BUTTON */
button {
  width: 100%;
  padding: 14px;
  margin-top: 12px;
  border: none;
  border-radius: 12px;
  background: #007bff;
  color: white;
  font-size: 15px;
}

/* FILE NAME */
.file-name {
  margin-top: 8px;
  font-size: 14px;
}

/* MODE */
.mode {
  margin-top: 12px;
  text-align: center;
}

/* LOADER */
.loader {
  display: none;
  text-align: center;
  margin-top: 10px;
  color: green;
}

/* HINT */
.hint {
  font-size: 12px;
  color: gray;
  margin-top: 5px;
}
</style>

</head>

<body>

<h1 style="display:none;">Split PDF Online Free</h1>

<div class="navbar">Split PDF</div>

<div class="container">
<div class="card">

<div class="drop-area" id="dropArea">
  Click or Drag PDF File
</div>

<input type="file" id="fileInput" accept="application/pdf" hidden>

<div class="file-name" id="fileName"></div>

<!-- MODE -->
<div class="mode">
  <label>
    <input type="radio" name="mode" value="single" checked>
    Single Page
  </label>

  <label>
    <input type="radio" name="mode" value="range">
    Page Range
  </label>
</div>

<!-- SINGLE -->
<div id="singleInput">
  <input type="number" id="singlePage" placeholder="Page number">
</div>

<!-- RANGE -->
<div id="rangeInput" style="display:none;">
  <input type="number" id="startPage" placeholder="Start">
  <input type="number" id="endPage" placeholder="End">
</div>

<div class="hint">Pages start from 1</div>

<button onclick="splitPDF()">Split PDF</button>

<div class="loader" id="loader">Processing...</div>

</div>
</div>

<script>
let file = null;

const dropArea = document.getElementById("dropArea");
const fileInput = document.getElementById("fileInput");

// CLICK
dropArea.onclick = () => fileInput.click();

// DRAG DROP
dropArea.addEventListener("dragover", e => {
  e.preventDefault();
  dropArea.style.background = "#eef5ff";
});

dropArea.addEventListener("dragleave", () => {
  dropArea.style.background = "#fafafa";
});

dropArea.addEventListener("drop", e => {
  e.preventDefault();
  file = e.dataTransfer.files[0];
  document.getElementById("fileName").innerText = file.name;
});

// FILE SELECT
fileInput.addEventListener("change", e => {
  file = e.target.files[0];
  document.getElementById("fileName").innerText = file.name;
});

// MODE SWITCH
document.querySelectorAll('input[name="mode"]').forEach(radio => {
  radio.addEventListener("change", () => {
    let mode = document.querySelector('input[name="mode"]:checked').value;

    document.getElementById("singleInput").style.display =
      mode === "single" ? "block" : "none";

    document.getElementById("rangeInput").style.display =
      mode === "range" ? "block" : "none";
  });
});

// SPLIT
async function splitPDF() {
  const { PDFDocument } = PDFLib;

  if (!file) {
    alert("Upload PDF");
    return;
  }

  let mode = document.querySelector('input[name="mode"]:checked').value;
  let pages = [];

  if (mode === "single") {
    let p = parseInt(document.getElementById("singlePage").value) - 1;

    if (isNaN(p) || p < 0) {
      alert("Enter valid page");
      return;
    }

    pages.push(p);
  }

  if (mode === "range") {
    let start = parseInt(document.getElementById("startPage").value) - 1;
    let end = parseInt(document.getElementById("endPage").value) - 1;

    if (isNaN(start) || isNaN(end) || start < 0 || end < start) {
      alert("Enter valid range");
      return;
    }

    for (let i = start; i <= end; i++) pages.push(i);
  }

  loader.style.display = "block";

  try {
    const bytes = await file.arrayBuffer();
    const pdf = await PDFDocument.load(bytes);
    const newPdf = await PDFDocument.create();

    const copiedPages = await newPdf.copyPages(pdf, pages);
    copiedPages.forEach(p => newPdf.addPage(p));

    const finalPdf = await newPdf.save();

    download(finalPdf, "split.pdf");
  } catch (e) {
    alert("Error processing PDF");
  }

  loader.style.display = "none";
}

// DOWNLOAD
function download(data, name) {
  const blob = new Blob([data], { type: "application/pdf" });
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = name;
  link.click();
}
</script>

</body>
</html>
