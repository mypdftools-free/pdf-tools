<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Merge PDF | My PDF Tools</title>

<!-- PDF LIB -->
<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>

<style>
*{box-sizing:border-box}

body{
margin:0;
font-family:-apple-system,Arial;
background:#f7f8fc;
color:#222;
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:16px;
background:white;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.logo{
font-weight:bold;
font-size:18px;
color:#e53935;
}

/* CONTAINER */
.container{
padding:20px 16px;
}

/* TITLE */
h1{font-size:24px;margin-bottom:10px;}
p{color:#666;font-size:14px;margin-bottom:20px;}

/* DROP */
.drop{
border:2px dashed #f28b82;
border-radius:20px;
padding:40px;
text-align:center;
color:#777;
margin-bottom:20px;
cursor:pointer;
}

/* FILE LIST */
.file{
background:#eee;
padding:12px;
border-radius:12px;
margin-bottom:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

/* BUTTON */
button{
width:100%;
padding:16px;
margin-top:20px;
border:none;
border-radius:16px;
background:#e53935;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

/* FOOTER */
.footer{
text-align:center;
padding:20px;
font-size:13px;
color:#666;
}

.footer a{
margin:0 6px;
color:#007bff;
text-decoration:none;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">My PDF Tools</div>
</div>

<div class="container">

<h1>Merge PDF</h1>
<p>Combine multiple PDF files into a single document. Drag to reorder.</p>

<div class="drop" onclick="fileInput.click()">
Drop PDF files here<br>
<small>Max 50MB per file</small>
</div>

<input type="file" id="fileInput" multiple accept="application/pdf" hidden>

<div id="fileList"></div>

<button onclick="mergePDF()">Merge PDFs</button>

</div>

<!-- FOOTER -->
<div class="footer">
© 2026 My PDF Tools  
<br><br>
<a href="privacy.html">Privacy Policy</a> |
<a href="about.html">About Us</a> |
<a href="contact.html">Contact</a>
</div>

<script>
let files = [];
const fileInput = document.getElementById("fileInput");
const fileList = document.getElementById("fileList");

fileInput.addEventListener("change", (e)=>{
  files = [...files, ...Array.from(e.target.files)];
  renderFiles();
});

function renderFiles(){
  fileList.innerHTML = "";

  files.forEach((file, index)=>{
    fileList.innerHTML += `
      <div class="file">
        ${file.name} (${Math.round(file.size/1024)} KB)
        <div>
          <button onclick="moveUp(${index})">←</button>
          <button onclick="moveDown(${index})">→</button>
          <button onclick="removeFile(${index})" style="color:red;">✖</button>
        </div>
      </div>
    `;
  });
}

function moveUp(i){
  if(i===0) return;
  [files[i], files[i-1]] = [files[i-1], files[i]];
  renderFiles();
}

function moveDown(i){
  if(i===files.length-1) return;
  [files[i], files[i+1]] = [files[i+1], files[i]];
  renderFiles();
}

function removeFile(i){
  files.splice(i,1);
  renderFiles();
}

async function mergePDF(){
  if(files.length < 2){
    alert("Add at least 2 PDFs");
    return;
  }

  const mergedPdf = await PDFLib.PDFDocument.create();

  for(const file of files){
    const bytes = await file.arrayBuffer();
    const pdf = await PDFLib.PDFDocument.load(bytes);
    const pages = await mergedPdf.copyPages(pdf, pdf.getPageIndices());

    pages.forEach(p => mergedPdf.addPage(p));
  }

  const mergedBytes = await mergedPdf.save();

  const blob = new Blob([mergedBytes], {type:'application/pdf'});
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "merged.pdf";
  a.click();
}
</script>

</body>
</html>
