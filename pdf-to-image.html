<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- SEO -->
<title>PDF to Image Online Free | My PDF Tools</title>
<meta name="description" content="Convert PDF to images online for free. Extract all pages as images. No upload required. Fast and secure.">

<!-- PDF JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: -apple-system, Arial;
  background: #f2f4f7;
}

/* NAVBAR */
.navbar {
  background: #007bff;
  color: white;
  padding: 16px;
  text-align: center;
  font-size: 18px;
  font-weight: bold;
}

/* CONTAINER */
.container {
  padding: 16px;
}

/* CARD */
.card {
  background: white;
  padding: 18px;
  border-radius: 18px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.08);
}

/* DROP AREA */
.drop-area {
  border: 2px dashed #007bff;
  padding: 25px;
  border-radius: 14px;
  text-align: center;
  cursor: pointer;
  background: #fafafa;
}

.drop-area:hover {
  background: #eef5ff;
}

/* FILE INFO */
.file-info {
  margin-top: 10px;
  font-size: 14px;
}

/* IMAGES */
.images img {
  width: 100%;
  margin-top: 12px;
  border-radius: 10px;
}

/* BUTTON */
button {
  width: 100%;
  padding: 14px;
  margin-top: 12px;
  border: none;
  border-radius: 12px;
  background: #007bff;
  color: white;
  font-size: 15px;
}

/* LOADER */
.loader {
  display: none;
  text-align: center;
  margin-top: 10px;
  color: green;
}
</style>

</head>

<body>

<h1 style="display:none;">PDF to Image Online Free</h1>

<div class="navbar">PDF to Image</div>

<div class="container">
<div class="card">

<div class="drop-area" id="drop">
  Click or Drag PDF File
</div>

<input type="file" id="fileInput" accept="application/pdf" hidden>

<div class="file-info" id="fileInfo"></div>

<button onclick="convert()">Convert to Images</button>

<button onclick="downloadAll()">Download All Pages</button>

<div class="loader" id="loader">Processing pages...</div>

<div class="images" id="output"></div>

</div>
</div>

<script>
let pdfFile = null;
let images = [];

const drop = document.getElementById("drop");
const fileInput = document.getElementById("fileInput");

// CLICK
drop.onclick = () => fileInput.click();

// DRAG DROP
drop.ondragover = e => {
  e.preventDefault();
  drop.style.background = "#eef5ff";
};

drop.ondragleave = () => {
  drop.style.background = "#fafafa";
};

drop.ondrop = e => {
  e.preventDefault();
  pdfFile = e.dataTransfer.files[0];
  fileInfo.innerText = pdfFile.name;
};

// FILE SELECT
fileInput.onchange = e => {
  pdfFile = e.target.files[0];
  fileInfo.innerText = pdfFile.name;
};

// CONVERT
async function convert() {
  if (!pdfFile) {
    alert("Upload PDF");
    return;
  }

  loader.style.display = "block";
  output.innerHTML = "";
  images = [];

  let pdf = await pdfjsLib.getDocument(URL.createObjectURL(pdfFile)).promise;

  fileInfo.innerText = pdfFile.name + " | Pages: " + pdf.numPages;

  for (let i = 1; i <= pdf.numPages; i++) {
    let page = await pdf.getPage(i);
    let viewport = page.getViewport({ scale: 1.5 });

    let canvas = document.createElement("canvas");
    let ctx = canvas.getContext("2d");

    canvas.width = viewport.width;
    canvas.height = viewport.height;

    await page.render({ canvasContext: ctx, viewport }).promise;

    let imgURL = canvas.toDataURL("image/png");
    images.push(imgURL);

    let img = document.createElement("img");
    img.src = imgURL;

    let btn = document.createElement("button");
    btn.innerText = "Download Page " + i;
    btn.onclick = () => downloadImage(imgURL, i);

    output.appendChild(img);
    output.appendChild(btn);
  }

  loader.style.display = "none";
}

// DOWNLOAD SINGLE
function downloadImage(data, page) {
  let link = document.createElement("a");
  link.href = data;
  link.download = "page-" + page + ".png";
  link.click();
}

// DOWNLOAD ALL
function downloadAll() {
  if (images.length === 0) {
    alert("Convert first");
    return;
  }

  images.forEach((img, i) => {
    downloadImage(img, i + 1);
  });
}
</script>

</body>
</html>
