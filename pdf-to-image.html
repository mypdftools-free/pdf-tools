<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PDF to Image | My PDF Tools</title>

<!-- PDF.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

<style>
*{box-sizing:border-box}

body{
margin:0;
font-family:-apple-system,Arial;
background:#f7f8fc;
color:#222;
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:16px;
background:white;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.logo{
font-weight:bold;
font-size:18px;
color:#e53935;
}

/* CONTAINER */
.container{
padding:20px 16px;
}

/* TITLE */
h1{
font-size:24px;
margin-bottom:10px;
}

p{
color:#666;
font-size:14px;
margin-bottom:20px;
}

/* DROP AREA */
.drop{
border:2px dashed #ddd;
border-radius:20px;
padding:40px;
text-align:center;
color:#777;
margin-bottom:20px;
cursor:pointer;
}

/* FILE INFO */
.file-box{
background:#eee;
padding:12px;
border-radius:12px;
margin-bottom:20px;
display:flex;
justify-content:space-between;
align-items:center;
}

/* PREVIEW */
.preview{
background:white;
padding:10px;
border-radius:16px;
margin-bottom:20px;
box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

/* BUTTON */
.download-btn{
display:block;
width:100%;
padding:14px;
background:#e53935;
color:white;
text-align:center;
border-radius:14px;
text-decoration:none;
font-weight:bold;
margin-bottom:20px;
}

/* FOOTER */
.footer{
text-align:center;
padding:20px;
font-size:13px;
color:#666;
}

.footer a{
margin:0 6px;
color:#007bff;
text-decoration:none;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">My PDF Tools</div>
</div>

<div class="container">

<h1>PDF to Image</h1>
<p>Convert each page of a PDF to a JPG image.</p>

<!-- DROP -->
<div class="drop" onclick="fileInput.click()">
  Drop a PDF here<br>
  <small>Max 50MB per file</small>
</div>

<input type="file" id="fileInput" accept="application/pdf" hidden>

<div id="fileInfo"></div>
<div id="output"></div>

</div>

<!-- FOOTER -->
<div class="footer">
© 2026 My PDF Tools  
<br><br>
<a href="privacy.html">Privacy Policy</a> |
<a href="about.html">About Us</a> |
<a href="contact.html">Contact</a>
</div>

<script>
const fileInput = document.getElementById("fileInput");
const fileInfo = document.getElementById("fileInfo");
const output = document.getElementById("output");

fileInput.addEventListener("change", handleFile);

function handleFile(){
  const file = fileInput.files[0];
  if(!file) return;

  fileInfo.innerHTML = `
    <div class="file-box">
      ${file.name} (${Math.round(file.size/1024)} KB)
      <span onclick="clearFile()" style="color:red;cursor:pointer;">✖</span>
    </div>
  `;

  const reader = new FileReader();
  reader.readAsArrayBuffer(file);

  reader.onload = function(){
    const typedArray = new Uint8Array(this.result);

    pdfjsLib.getDocument(typedArray).promise.then(pdf => {
      output.innerHTML = "";

      for(let i=1;i<=pdf.numPages;i++){
        pdf.getPage(i).then(page => {

          const scale = 1.5;
          const viewport = page.getViewport({ scale });

          const canvas = document.createElement("canvas");
          const context = canvas.getContext("2d");

          canvas.height = viewport.height;
          canvas.width = viewport.width;

          page.render({ canvasContext: context, viewport }).promise.then(() => {

            const imgURL = canvas.toDataURL("image/jpeg");

            const div = document.createElement("div");
            div.innerHTML = `
              <div class="preview">
                <img src="${imgURL}" style="width:100%;border-radius:10px;">
              </div>
              <a class="download-btn" href="${imgURL}" download="page-${i}.jpg">
                Download page-${i}.jpg
              </a>
            `;

            output.appendChild(div);

          });

        });
      }

    });
  }
}

function clearFile(){
  fileInput.value = "";
  fileInfo.innerHTML = "";
  output.innerHTML = "";
}
</script>

</body>
</html>
